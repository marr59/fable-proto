<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8" />
 <meta name="viewport" content="width=device-width, initial-scale=1.0" />
 <title>Fable Proto — Path of the Demon</title>
 <link rel="preconnect" href="https://fonts.googleapis.com" />
 <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&display=swap" />
 <link rel="stylesheet" href="style.css" />

 <script type="importmap">
 {
 "imports": {
 "three": "https://cdn.jsdelivr.net/npm/three@0.168.0/build/three.module.js",
 "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.168.0/examples/jsm/"
 }
 }
 </script>
</head>
<body>

 <div id="hud">

 <!-- Top-left: avatar + stats -->
 <div id="hud-top-left">
 <div id="avatar-wrap">
  <div id="avatar"></div>
 </div>
 <div id="stats">
  <div id="hp-label">Health</div>
  <div id="hp-bar-wrap">
  <div id="hp-bar-fill"></div>
  </div>
  <div id="karma-label">Karma: <span id="karma-value">0</span></div>
  <div id="unit-label">Unit: <span id="unit-class">—</span></div>
  <div id="train-wrap"><div id="train-fill"></div></div>
 </div>
 </div>

 <!-- Bottom-center: action buttons -->
 <div id="hud-bottom">
 <button id="btn-good" class="action-btn good">☯ Path of Light</button>
 <button id="btn-evil" class="action-btn evil">⛧ Path of Demon</button>
 </div>

 </div>

 <div id="selbox"></div>
 <div id="help">drag to select · A — select all · click unit — select · ground — move · guild — train · edge — scroll camera</div>

 <script type="module" src="script.js"></script>
</body>
</html>
